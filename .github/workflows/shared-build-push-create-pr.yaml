name: Build and Push Container Image, and Push Update to the Datahub Repo 
on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
      hub:
        type: string
        required: true
      app_id:
        type: string
        required: true
      image_builder_bot_name:
        type: string
        required: true
      image_builder_bot_email:
        type: string
        required: true
    secrets:
      GAR_SECRET_KEY:
        required: true
      PRIVATE_KEY_SECRET:
        required: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOCKER_CONFIG: $HOME/.docker
      IMAGE: ${{ inputs.image }}
    outputs:
      image-tag: ${{ steps.build-and-push.outputs.IMAGE_SHA_TAG }}

    steps:
      - name: Check out the image repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # OR "2" -> To retrieve the preceding commit.

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Log in to GAR
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GAR_SECRET_KEY }}

      - name: Build the image and push to artifact registry
        id: build-and-push
        uses: jupyterhub/repo2docker-action@master
        with:
          FORCE_REPO2DOCKER_VERSION: jupyter-repo2docker==2024.07.0
          DOCKER_REGISTRY: us-central1-docker.pkg.dev
          IMAGE_NAME: ${{ env.IMAGE }}
          # Disable pushing a 'latest' tag, as this often just causes confusion
          LATEST_TAG_OFF: true
          # Put repo contents in /srv/repo, rather than the default (/home/jovyan). The home directory
          # is mounted over by persistent storage when we are using the built image in a JupyterHub, and
          # so all contents put in /home/jovyan are lost. This particularly prevents any 'start' script from
          # working, as it is needed in runtime.
          REPO_DIR: /srv/repo

      # Lets us monitor disks getting full as images get bigger over time
      - name: Show how much disk space is left
        run: df -h

  update-deployment-image-tag:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    env:
      HUB: ${{ inputs.hub }}
      IMAGE: ${{ inputs.image }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.PRIVATE_KEY_SECRET}}
          owner: ${{ github.repository_owner }}

      - name: Checkout the datahub repo
        if: ${{ env.IMAGE_TAG }}
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          repository: 'berkeley-dsep-infra/datahub'
          sparse-checkout: |
            deployments/
  
      - name: Set git identity
        if: ${{ env.IMAGE_TAG }}
        run: |
          git config --global user.email "${{ inputs.image_builder_bot_email }}"
          git config --global user.name "${{ inputs.image_builder_bot_name }}"

      - name: Update the tag for any deployments that use this image
        if: ${{ env.IMAGE_TAG }}
        run: |
          for deployment in $(grep -lr "${IMAGE}" deployments/); do
            echo "Processing $deployment..."
          
            # ---- Inline image update: image: repo/name:tag ----
            grep "${IMAGE}:" "$deployment" | while read -r line; do
              # Extract the tag (no space after colon)
              old_tag=$(echo "$line" | sed -E 's/.*:\s*(.*)/\1/')
              echo "  Updating inline tag from $old_tag to ${IMAGE_TAG}"
              sed -i -e "s,${IMAGE}:${old_tag},${IMAGE}:${IMAGE_TAG},g" "$deployment"
              echo "  Updated inline image tag: ${old_tag} -> ${IMAGE_TAG}"
            done
          
            # ---- JupyterHub-style image tag update: image and tag fields ---
            old_hash=$(grep -hA1 "${IMAGE}" "$deployment" | grep "tag" | awk -F ': ' '{print $2}')
            
            # Only update if we found the old hash (i.e., tag)
            if [[ -n "$old_hash" ]]; then
              new_hash=${IMAGE_TAG}
              echo "  Updating JupyterHub-style tag from $old_hash to ${new_hash}"
              sed -i -e "s,${old_hash},${new_hash},g" "$deployment"
              echo "  Updated JupyterHub-style tag: ${old_hash} -> ${new_hash}"
            fi
          done
  
      - name: Create feature branch, add, commit, push changes and open a pull request
        if: ${{ env.IMAGE_TAG }}
        env: 
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CHANGED_FILES=$(git status --porcelain -uno | awk '{print $2}')
          git diff
          git checkout -b update-${HUB}-image-tag-${IMAGE_TAG}
          # to be safe, only add files that have changed
          for file in $(echo -e ${CHANGED_FILES}); do
            git add ${file}
          done

          BRANCH="update-${HUB}-image-tag-${IMAGE_TAG}"
          MESSAGE="update ${HUB} image tag to ${IMAGE_TAG}"
          git commit -m "${MESSAGE}"
          git push origin ${BRANCH}
          #
          # now create a PR!
          #
          cat << EOF > ${HOME}/pr-body.txt
          ${MESSAGE}

          ${CHANGED_FILES}
          EOF
          BODY=$(cat ${HOME}/pr-body.txt)
          gh pr new -t "${MESSAGE}" -b "${BODY}" -H${BRANCH} -Bstaging

      - name: Print out a message if no PR is created
        if: ${{ ! env.IMAGE_TAG }}
        run: |
          echo "Image not updated, no push to datahub repo required"
